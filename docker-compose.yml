services:
  proxy-bridge:
    image: "${PYTHON_BASE_IMAGE:-python:3.12-slim}"
    restart: unless-stopped
    network_mode: host
    command:
      [
        "python",
        "/app/proxy-bridge.py",
        "--listen-host",
        "${DOCKER_PROXY_BRIDGE_HOST:-172.30.0.1}",
        "--listen-port",
        "${DOCKER_PROXY_BRIDGE_PORT:-7890}",
        "--target-host",
        "127.0.0.1",
        "--target-port",
        "${HOST_PROXY_PORT:-7890}",
      ]
    volumes:
      - ./docker/proxy-bridge.py:/app/proxy-bridge.py:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, socket; s = socket.create_connection((os.environ.get('DOCKER_PROXY_BRIDGE_HOST', '172.30.0.1'), int(os.environ.get('DOCKER_PROXY_BRIDGE_PORT', '7890'))), timeout=3); s.close()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      args:
        PYTHON_BASE_IMAGE: "${PYTHON_BASE_IMAGE:-python:3.12-slim}"
        UV_IMAGE: "${UV_IMAGE:-ghcr.io/astral-sh/uv:latest}"
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      ECHOES_ENV: production
      CORS_ORIGINS: "https://${APP_DOMAIN:?APP_DOMAIN is required}"
      TRUSTED_HOSTS: "${APP_DOMAIN:?APP_DOMAIN is required},127.0.0.1,localhost,backend"
      SESSION_COOKIE_SECURE: "true"
      EMBEDDING_PROXY: "${DOCKER_EMBEDDING_PROXY:-http://172.30.0.1:7890}"
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-18000}:8000"
    volumes:
      - ./data:/project/data
    depends_on:
      proxy-bridge:
        condition: service_healthy
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        NODE_BASE_IMAGE: "${NODE_BASE_IMAGE:-node:20-slim}"
        BACKEND_URL: http://backend:8000
        APP_BASE_PATH: "${APP_BASE_PATH:-}"
        NEXT_PUBLIC_BASE_PATH: "${APP_BASE_PATH:-}"
        NEXT_PUBLIC_API_BASE_URL: "${APP_BASE_PATH:-}/api/v1"
        NEXT_PUBLIC_APP_URL: "https://${APP_DOMAIN:?APP_DOMAIN is required}${APP_BASE_PATH:-}"
    restart: unless-stopped
    environment:
      APP_BASE_PATH: "${APP_BASE_PATH:-}"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_net
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-13000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const path = process.env.APP_BASE_PATH || '/'; fetch('http://127.0.0.1:3000' + (path || '/')).then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    profiles: ["edge"]
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: "${APP_DOMAIN:?APP_DOMAIN is required}"
      LETSENCRYPT_EMAIL: "${LETSENCRYPT_EMAIL:-}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - app_net

volumes:
  caddy_data:
  caddy_config:

networks:
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: "${DOCKER_APP_SUBNET:-172.30.0.0/24}"
          gateway: "${DOCKER_APP_GATEWAY:-172.30.0.1}"
