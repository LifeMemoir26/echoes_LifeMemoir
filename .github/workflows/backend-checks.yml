name: backend-checks

on:
  push:
    paths:
      - "backend/**"
      - "scripts/check_backend.sh"
      - "scripts/check_quick.sh"
      - ".github/workflows/backend-checks.yml"
  pull_request:
    paths:
      - "backend/**"
      - "scripts/check_backend.sh"
      - "scripts/check_quick.sh"
      - ".github/workflows/backend-checks.yml"

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Run backend low-load checks
        run: ./scripts/check_backend.sh
